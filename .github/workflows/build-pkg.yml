name: 🎮 Build PS4 PKG

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão do app (ex: 01.00)'
        required: false
        default: '01.00'

jobs:
  build-pkg:
    name: Compilar eboot.bin e gerar fPKG
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ── 2. Dependências base ─────────────────────────────
      - name: 🔧 Instalar dependências
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3 python3-pip \
            clang lld \
            wget curl unzip tar \
            make -qq
          pip3 install Pillow --quiet

      # ── 3. Instalar OpenOrbis Toolchain v0.5.4 ──────────
      - name: 🎮 Instalar OpenOrbis Toolchain
        run: |
          echo "[TOOLCHAIN] Baixando OpenOrbis v0.5.4..."
          mkdir -p /opt/openorbis

          # Asset oficial: toolchain-llvm-18.tar.gz
          wget -q \
            "https://github.com/OpenOrbis/OpenOrbis-PS4-Toolchain/releases/download/v0.5.4/toolchain-llvm-18.tar.gz" \
            -O /tmp/openorbis.tar.gz

          # Inspecionar estrutura do tar antes de extrair
          echo "[TOOLCHAIN] Estrutura do arquivo:"
          tar -tzf /tmp/openorbis.tar.gz | head -30

          # Detectar profundidade do diretório raiz
          ROOT_DIR=$(tar -tzf /tmp/openorbis.tar.gz | head -1 | cut -d/ -f1)
          echo "[TOOLCHAIN] Diretório raiz: $ROOT_DIR"

          tar -xzf /tmp/openorbis.tar.gz -C /opt/openorbis

          # Normalizar: se extraiu para subpasta, mover para raiz
          if [ -d "/opt/openorbis/$ROOT_DIR" ] && [ "$ROOT_DIR" != "." ]; then
            mv /opt/openorbis/$ROOT_DIR/* /opt/openorbis/ 2>/dev/null || true
            mv /opt/openorbis/$ROOT_DIR/.[!.]* /opt/openorbis/ 2>/dev/null || true
            rmdir /opt/openorbis/$ROOT_DIR 2>/dev/null || true
          fi

          echo "[TOOLCHAIN] Conteúdo final:"
          ls /opt/openorbis/

          # Tornar binários executáveis
          find /opt/openorbis -type f \( -name "clang*" -o -name "create-eboot" -o -name "ld.lld" \) \
            -exec chmod +x {} \; 2>/dev/null || true

          # Localizar clang
          CLANG_FOUND=$(find /opt/openorbis -name "clang" -o -name "clang-18" 2>/dev/null | head -1)
          echo "[TOOLCHAIN] clang encontrado: ${CLANG_FOUND:-NÃO ENCONTRADO}"

          echo "OO_PS4_TOOLCHAIN=/opt/openorbis" >> $GITHUB_ENV
          echo "[OK] Toolchain pronto"

      # ── 4. Compilar eboot.bin ────────────────────────────
      - name: 🔨 Compilar eboot.bin
        env:
          OO_PS4_TOOLCHAIN: /opt/openorbis
        run: |
          echo "[BUILD] Compilando main.c para PS4..."
          mkdir -p build

          # Localizar clang do OpenOrbis (prioridade) ou usar o do sistema
          CLANG_PS4=$(find /opt/openorbis -name "clang" -type f 2>/dev/null | head -1)
          CLANG_PS4=${CLANG_PS4:-$(find /opt/openorbis -name "clang-18" -type f 2>/dev/null | head -1)}
          if [ -z "$CLANG_PS4" ] || [ ! -x "$CLANG_PS4" ]; then
            echo "[WARN] clang do OpenOrbis não encontrado — usando clang do sistema"
            CLANG_PS4=$(command -v clang-18 || command -v clang-17 || command -v clang)
          fi
          echo "[BUILD] Compilador: $CLANG_PS4"
          $CLANG_PS4 --version | head -1

          # Localizar include do OpenOrbis
          ORBIS_INC=$(find /opt/openorbis -type d -name "orbis" 2>/dev/null | head -1)
          ORBIS_INC=$(dirname "$ORBIS_INC" 2>/dev/null)
          echo "[BUILD] Include: $ORBIS_INC"

          # ── Flags normais de frontend clang (sem -cc1) ──
          CFLAGS="--target=x86_64-pc-freebsd12 \
            -fuse-init-array \
            -fPIE \
            -O2 \
            -msse4.2 \
            -nostdlib"

          if [ -n "$ORBIS_INC" ]; then
            CFLAGS="$CFLAGS -I$ORBIS_INC -I/opt/openorbis/include/c++/v1 -nostdinc"
          fi

          # Compilar
          $CLANG_PS4 $CFLAGS -c src/main.c -o build/main.o
          echo "[OK] main.o compilado"

          # Linkar com ld.lld
          LLD=$(command -v ld.lld-18 || command -v ld.lld)
          echo "[LINK] linker: $LLD"

          LDFLAGS="-m elf_x86_64 -pie --eh-frame-hdr"
          if [ -f /opt/openorbis/link.x ]; then
            LDFLAGS="$LDFLAGS --script /opt/openorbis/link.x"
          fi
          LDFLAGS="$LDFLAGS -L/opt/openorbis/lib"

          if [ -f /opt/openorbis/lib/crt1.o ]; then
            LDFLAGS="$LDFLAGS /opt/openorbis/lib/crt1.o"
          fi

          LDFLAGS="$LDFLAGS -lSceLibcInternal -lkernel -lScePthread -lSceSystemService -lSceUserService"

          $LLD $LDFLAGS build/main.o -o build/UnitVPro.elf
          echo "[OK] UnitVPro.elf gerado"

          # Converter ELF → eboot.bin
          CREATE_EBOOT=$(find /opt/openorbis -name "create-eboot" -type f 2>/dev/null | head -1)
          if [ -n "$CREATE_EBOOT" ] && [ -x "$CREATE_EBOOT" ]; then
            "$CREATE_EBOOT" \
              -in="build/UnitVPro.elf" \
              -out="build/eboot.bin" \
              -titleid="UNITV0001" \
              -paid=0x3800000000000011
            echo "[OK] eboot.bin via create-eboot"
          else
            echo "[WARN] create-eboot não encontrado — copiando ELF como eboot.bin"
            cp build/UnitVPro.elf build/eboot.bin
          fi

          ls -lh build/

      # ── 5. Gerar assets (param.sfo + ícones + web files) ─
      - name: 🎨 Gerar param.sfo, ícones e copiar web app
        run: |
          VERSION="${{ github.event.inputs.version || '01.00' }}"
          python3 pkg-tools/make_pkg_assets.py "$VERSION"
          echo "[OK] Assets gerados:"
          ls -lh pkg/sce_sys/ 2>/dev/null || true
          echo "[OK] Web files:"
          find pkg/USRDIR/web -name "*.html" -o -name "*.js" 2>/dev/null | head -10

      # ── 6. Baixar PkgTool.Core ───────────────────────────
      - name: 📦 Baixar PkgTool.Core (LibOrbisPkg)
        run: |
          mkdir -p tools/pkgtool

          # Instalar .NET runtime
          sudo apt-get install -y dotnet-runtime-8.0 2>/dev/null || \
          sudo apt-get install -y dotnet-runtime-6.0 2>/dev/null || true

          # Baixar PkgTool.Core
          PKGTOOL_URL="https://github.com/maxton/LibOrbisPkg/releases/download/v0.6/PkgTool.Core.zip"
          wget -q "$PKGTOOL_URL" -O tools/PkgTool.zip 2>/dev/null || true

          if [ -f tools/PkgTool.zip ]; then
            unzip -q tools/PkgTool.zip -d tools/pkgtool/
            echo "[OK] PkgTool.Core extraído:"
            ls tools/pkgtool/
          else
            echo "[WARN] PkgTool.Core não disponível"
          fi

      # ── 7. Gerar pkg.gp4 ────────────────────────────────
      - name: 📋 Gerar pkg.gp4
        run: |
          VERSION="${{ github.event.inputs.version || '01.00' }}"
          python3 pkg-tools/make_gp4.py "$VERSION"

      # ── 8. Build do PKG ──────────────────────────────────
      - name: 🔨 Build fPKG
        run: |
          mkdir -p output
          PKG_BUILT=0

          # Tentar PkgTool.Core .dll via dotnet
          PKGTOOL_DLL=$(find tools/pkgtool -name "PkgTool.Core.dll" 2>/dev/null | head -1)
          if [ -n "$PKGTOOL_DLL" ] && command -v dotnet &>/dev/null; then
            echo "[BUILD] Usando PkgTool.Core via dotnet..."
            dotnet "$PKGTOOL_DLL" pkg_build pkg/pkg.gp4 output/ && PKG_BUILT=1
          fi

          # Tentar executável nativo
          if [ "$PKG_BUILT" -eq 0 ]; then
            PKGTOOL_EXE=$(find tools/pkgtool -type f -not -name "*.dll" -not -name "*.xml" 2>/dev/null | head -1)
            if [ -n "$PKGTOOL_EXE" ]; then
              chmod +x "$PKGTOOL_EXE" 2>/dev/null
              "$PKGTOOL_EXE" pkg_build pkg/pkg.gp4 output/ && PKG_BUILT=1
            fi
          fi

          # Fallback Python
          if [ "$PKG_BUILT" -eq 0 ]; then
            echo "[BUILD] Usando builder Python como fallback..."
            python3 pkg-tools/build_pkg.py
          fi

          echo "[OUTPUT] Resultado:"
          ls -lh output/

      # ── 9. Renomear PKG ──────────────────────────────────
      - name: 📝 Renomear PKG final
        run: |
          VERSION="${{ github.event.inputs.version || '01.00' }}"
          REF="${{ github.ref_name }}"
          NAME="UnitVPro_PS4_${REF}_v${VERSION}.pkg"
          find output/ -name "*.pkg" -exec mv {} "output/${NAME}" \; 2>/dev/null || true
          echo "[OK] PKG final:"
          ls -lh output/

      # ── 10. Upload artefato ──────────────────────────────
      - name: 📤 Upload PKG
        uses: actions/upload-artifact@v4
        with:
          name: UnitVPro-PS4-PKG
          path: output/*.pkg
          if-no-files-found: warn
          retention-days: 30

      # ── 11. GitHub Release (somente tags v*) ─────────────
      - name: 🚀 Criar GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: output/*.pkg
          name: "🎮 UnitV Pro PS4 ${{ github.ref_name }}"
          body: |
            ## 🎮 UnitV Pro — App IPTV para PS4

            ### ⬇️ Como instalar
            1. Baixe o arquivo `.pkg` abaixo
            2. Copie para a **raiz** de um pendrive **exFAT**
            3. No PS4 com GoldHEN: `Debug Settings → Package Installer`
            4. Selecione e instale

            | Campo | Valor |
            |-------|-------|
            | Title ID | `UNITV0001` |
            | Versão | `${{ github.ref_name }}` |
            | Build | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            ### 🕹️ Controles
            | Botão | Ação |
            |-------|------|
            | D-Pad | Navegar |
            | X (Cruz) | Confirmar |
            | O (Bola) | Voltar |
            | □ Quadrado | Favoritar |
            | △ Triângulo | Buscar |
            | L1 / R1 | Trocar aba |

            > ⚠️ Requer PS4 com **GoldHEN** e conexão com internet.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
