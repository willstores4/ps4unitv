name: 🎮 Build PS4 PKG

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão do app (ex: 01.00)'
        required: false
        default: '01.00'

jobs:
  build-pkg:
    name: Compilar eboot.bin e gerar fPKG
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ── 2. Dependências base ─────────────────────────────
      - name: 🔧 Instalar dependências
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3 python3-pip \
            clang lld \
            wget curl unzip tar \
            make -qq
          pip3 install Pillow --quiet

      # ── 3. Instalar OpenOrbis Toolchain v0.5.4 ──────────
      - name: 🎮 Instalar OpenOrbis Toolchain
        run: |
          echo "[TOOLCHAIN] Baixando OpenOrbis v0.5.4..."
          mkdir -p /opt/openorbis

          # Asset oficial: toolchain-llvm-18.tar.gz
          wget -q \
            "https://github.com/OpenOrbis/OpenOrbis-PS4-Toolchain/releases/download/v0.5.4/toolchain-llvm-18.tar.gz" \
            -O /tmp/openorbis.tar.gz

          echo "[TOOLCHAIN] Extraindo..."
          tar -xzf /tmp/openorbis.tar.gz -C /opt/openorbis --strip-components=1 2>/dev/null || \
          tar -xzf /tmp/openorbis.tar.gz -C /opt/openorbis

          echo "[TOOLCHAIN] Estrutura:"
          ls /opt/openorbis/

          # Tornar binários executáveis
          find /opt/openorbis/bin -type f -exec chmod +x {} \; 2>/dev/null || true

          # Exportar variável de ambiente
          echo "OO_PS4_TOOLCHAIN=/opt/openorbis" >> $GITHUB_ENV
          echo "[OK] OO_PS4_TOOLCHAIN=/opt/openorbis"

      # ── 4. Compilar eboot.bin ────────────────────────────
      - name: 🔨 Compilar eboot.bin
        env:
          OO_PS4_TOOLCHAIN: /opt/openorbis
        run: |
          echo "[BUILD] Compilando main.c para PS4..."
          mkdir -p build

          # Verificar toolchain
          CLANG_PS4=$(find /opt/openorbis -name "clang" -o -name "clang-18" 2>/dev/null | head -1)
          if [ -z "$CLANG_PS4" ]; then
            echo "[WARN] clang do OpenOrbis não encontrado, usando clang do sistema..."
            CLANG_PS4=clang
          fi
          echo "[BUILD] Usando compilador: $CLANG_PS4"

          # Flags de compilação para PS4 x86_64-freebsd
          CFLAGS="-cc1 -triple x86_64-pc-freebsd-elf \
            -munwind-tables -fuse-init-array \
            -builtin-headers-in-system-modules \
            -O2 -target-feature +sse4.2 \
            -I/opt/openorbis/include \
            -I/opt/openorbis/include/c++/v1 \
            -x c"

          # Compilar para objeto
          $CLANG_PS4 $CFLAGS src/main.c -emit-obj -o build/main.o
          echo "[OK] main.o compilado"

          # Linkar com lld
          LDFLAGS="-m elf_x86_64 -pie \
            --eh-frame-hdr \
            -L/opt/openorbis/lib \
            /opt/openorbis/lib/crt1.o \
            -lSceLibcInternal -lkernel \
            -lScePthread -lSceSystemService -lSceUserService"

          if [ -f /opt/openorbis/link.x ]; then
            LDFLAGS="--script /opt/openorbis/link.x $LDFLAGS"
          fi

          ld.lld $LDFLAGS build/main.o -o build/UnitVPro.elf
          echo "[OK] UnitVPro.elf gerado"

          # Converter ELF → eboot.bin
          CREATE_EBOOT=$(find /opt/openorbis -name "create-eboot" 2>/dev/null | head -1)
          if [ -n "$CREATE_EBOOT" ]; then
            chmod +x "$CREATE_EBOOT"
            "$CREATE_EBOOT" \
              -in="build/UnitVPro.elf" \
              -out="build/eboot.bin" \
              -titleid="UNITV0001" \
              -paid=0x3800000000000011
            echo "[OK] eboot.bin criado via create-eboot"
          else
            # Fallback: usar objcopy para criar eboot.bin mínimo
            echo "[WARN] create-eboot não encontrado — usando llvm-objcopy"
            llvm-objcopy --output-target=binary build/UnitVPro.elf build/eboot.bin 2>/dev/null || \
            cp build/UnitVPro.elf build/eboot.bin
          fi

          ls -lh build/

      # ── 5. Gerar assets (param.sfo + ícones + web files) ─
      - name: 🎨 Gerar param.sfo, ícones e copiar web app
        run: |
          VERSION="${{ github.event.inputs.version || '01.00' }}"
          python3 pkg-tools/make_pkg_assets.py "$VERSION"
          echo "[OK] Assets gerados:"
          ls -lh pkg/sce_sys/ 2>/dev/null || true
          echo "[OK] Web files:"
          find pkg/USRDIR/web -name "*.html" -o -name "*.js" 2>/dev/null | head -10

      # ── 6. Baixar PkgTool.Core ───────────────────────────
      - name: 📦 Baixar PkgTool.Core (LibOrbisPkg)
        run: |
          mkdir -p tools/pkgtool

          # Instalar .NET runtime
          sudo apt-get install -y dotnet-runtime-8.0 2>/dev/null || \
          sudo apt-get install -y dotnet-runtime-6.0 2>/dev/null || true

          # Baixar PkgTool.Core
          PKGTOOL_URL="https://github.com/maxton/LibOrbisPkg/releases/download/v0.6/PkgTool.Core.zip"
          wget -q "$PKGTOOL_URL" -O tools/PkgTool.zip 2>/dev/null || true

          if [ -f tools/PkgTool.zip ]; then
            unzip -q tools/PkgTool.zip -d tools/pkgtool/
            echo "[OK] PkgTool.Core extraído:"
            ls tools/pkgtool/
          else
            echo "[WARN] PkgTool.Core não disponível"
          fi

      # ── 7. Gerar pkg.gp4 ────────────────────────────────
      - name: 📋 Gerar pkg.gp4
        run: |
          VERSION="${{ github.event.inputs.version || '01.00' }}"
          python3 pkg-tools/make_gp4.py "$VERSION"

      # ── 8. Build do PKG ──────────────────────────────────
      - name: 🔨 Build fPKG
        run: |
          mkdir -p output
          PKG_BUILT=0

          # Tentar PkgTool.Core .dll via dotnet
          PKGTOOL_DLL=$(find tools/pkgtool -name "PkgTool.Core.dll" 2>/dev/null | head -1)
          if [ -n "$PKGTOOL_DLL" ] && command -v dotnet &>/dev/null; then
            echo "[BUILD] Usando PkgTool.Core via dotnet..."
            dotnet "$PKGTOOL_DLL" pkg_build pkg/pkg.gp4 output/ && PKG_BUILT=1
          fi

          # Tentar executável nativo
          if [ "$PKG_BUILT" -eq 0 ]; then
            PKGTOOL_EXE=$(find tools/pkgtool -type f -not -name "*.dll" -not -name "*.xml" 2>/dev/null | head -1)
            if [ -n "$PKGTOOL_EXE" ]; then
              chmod +x "$PKGTOOL_EXE" 2>/dev/null
              "$PKGTOOL_EXE" pkg_build pkg/pkg.gp4 output/ && PKG_BUILT=1
            fi
          fi

          # Fallback Python
          if [ "$PKG_BUILT" -eq 0 ]; then
            echo "[BUILD] Usando builder Python como fallback..."
            python3 pkg-tools/build_pkg.py
          fi

          echo "[OUTPUT] Resultado:"
          ls -lh output/

      # ── 9. Renomear PKG ──────────────────────────────────
      - name: 📝 Renomear PKG final
        run: |
          VERSION="${{ github.event.inputs.version || '01.00' }}"
          REF="${{ github.ref_name }}"
          NAME="UnitVPro_PS4_${REF}_v${VERSION}.pkg"
          find output/ -name "*.pkg" -exec mv {} "output/${NAME}" \; 2>/dev/null || true
          echo "[OK] PKG final:"
          ls -lh output/

      # ── 10. Upload artefato ──────────────────────────────
      - name: 📤 Upload PKG
        uses: actions/upload-artifact@v4
        with:
          name: UnitVPro-PS4-PKG
          path: output/*.pkg
          if-no-files-found: warn
          retention-days: 30

      # ── 11. GitHub Release (somente tags v*) ─────────────
      - name: 🚀 Criar GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: output/*.pkg
          name: "🎮 UnitV Pro PS4 ${{ github.ref_name }}"
          body: |
            ## 🎮 UnitV Pro — App IPTV para PS4

            ### ⬇️ Como instalar
            1. Baixe o arquivo `.pkg` abaixo
            2. Copie para a **raiz** de um pendrive **exFAT**
            3. No PS4 com GoldHEN: `Debug Settings → Package Installer`
            4. Selecione e instale

            | Campo | Valor |
            |-------|-------|
            | Title ID | `UNITV0001` |
            | Versão | `${{ github.ref_name }}` |
            | Build | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            ### 🕹️ Controles
            | Botão | Ação |
            |-------|------|
            | D-Pad | Navegar |
            | X (Cruz) | Confirmar |
            | O (Bola) | Voltar |
            | □ Quadrado | Favoritar |
            | △ Triângulo | Buscar |
            | L1 / R1 | Trocar aba |

            > ⚠️ Requer PS4 com **GoldHEN** e conexão com internet.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
