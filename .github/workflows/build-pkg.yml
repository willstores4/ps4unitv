name: 🎮 Build PS4 PKG

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão do app (ex: 01.00)'
        required: false
        default: '01.00'

jobs:
  build-pkg:
    name: Compilar eboot.bin e gerar fPKG
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ── 2. Dependências base ─────────────────────────────
      - name: 🔧 Instalar dependências
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3 python3-pip \
            clang lld \
            wget curl unzip tar \
            make -qq
          pip3 install Pillow --quiet

      # ── 3. Instalar OpenOrbis Toolchain v0.5.4 ──────────
      - name: 🎮 Instalar OpenOrbis Toolchain
        run: |
          echo "[TOOLCHAIN] Baixando OpenOrbis v0.5.4..."
          mkdir -p /opt/openorbis

          # Asset oficial: toolchain-llvm-18.tar.gz
          wget -q \
            "https://github.com/OpenOrbis/OpenOrbis-PS4-Toolchain/releases/download/v0.5.4/toolchain-llvm-18.tar.gz" \
            -O /tmp/openorbis.tar.gz

          # Inspecionar estrutura do tar antes de extrair
          echo "[TOOLCHAIN] Estrutura do arquivo:"
          tar -tzf /tmp/openorbis.tar.gz | head -30

          # Detectar profundidade do diretório raiz
          ROOT_DIR=$(tar -tzf /tmp/openorbis.tar.gz | head -1 | cut -d/ -f1)
          echo "[TOOLCHAIN] Diretório raiz: $ROOT_DIR"

          tar -xzf /tmp/openorbis.tar.gz -C /opt/openorbis

          # Normalizar: se extraiu para subpasta, mover para raiz
          if [ -d "/opt/openorbis/$ROOT_DIR" ] && [ "$ROOT_DIR" != "." ]; then
            mv /opt/openorbis/$ROOT_DIR/* /opt/openorbis/ 2>/dev/null || true
            mv /opt/openorbis/$ROOT_DIR/.[!.]* /opt/openorbis/ 2>/dev/null || true
            rmdir /opt/openorbis/$ROOT_DIR 2>/dev/null || true
          fi

          echo "[TOOLCHAIN] Conteúdo final:"
          ls /opt/openorbis/

          # Tornar binários executáveis
          find /opt/openorbis -type f \( -name "clang*" -o -name "create-eboot" -o -name "ld.lld" \) \
            -exec chmod +x {} \; 2>/dev/null || true

          # Localizar clang
          CLANG_FOUND=$(find /opt/openorbis -name "clang" -o -name "clang-18" 2>/dev/null | head -1)
          echo "[TOOLCHAIN] clang encontrado: ${CLANG_FOUND:-NÃO ENCONTRADO}"

          echo "OO_PS4_TOOLCHAIN=/opt/openorbis" >> $GITHUB_ENV
          echo "[OK] Toolchain pronto"

      # ── 4. Compilar eboot.bin ────────────────────────────
      - name: 🔨 Compilar eboot.bin
        run: |
          echo "[BUILD] Compilando main.c para PS4..."
          mkdir -p build

          # ── Detectar path real do toolchain ──────────────────
          # O tar extrai para /opt/openorbis/PS4Toolchain/ (subpasta)
          TOOLCHAIN=""
          for p in \
              /opt/openorbis/PS4Toolchain \
              /opt/openorbis \
              /opt/openorbis/openorbis-ps4-toolchain; do
            if [ -d "$p/include/orbis" ]; then
              TOOLCHAIN="$p"
              break
            fi
          done
          # Fallback: busca pelo diretório que contém include/orbis
          if [ -z "$TOOLCHAIN" ]; then
            TOOLCHAIN=$(find /opt/openorbis -type d -name "orbis" 2>/dev/null \
                        | sed 's|/orbis$||' | sed 's|/include$||' | head -1)
          fi
          echo "[BUILD] Toolchain detectado: $TOOLCHAIN"
          echo "[BUILD] Conteúdo: $(ls $TOOLCHAIN 2>/dev/null | tr '\n' ' ')"

          # ── Compilador ────────────────────────────────────────
          # Usar clang do sistema (OpenOrbis v0.5.4 não inclui clang próprio)
          CLANG=$(command -v clang-18 || command -v clang-17 || command -v clang)
          echo "[BUILD] Compilador: $CLANG ($($CLANG --version | head -1))"

          # ── Flags de compilação ───────────────────────────────
          CFLAGS="--target=x86_64-pc-freebsd12"
          CFLAGS="$CFLAGS -fuse-init-array -fPIE -O2 -msse4.2"
          CFLAGS="$CFLAGS -nostdinc -nostdlib"

          # Headers do OpenOrbis
          if [ -n "$TOOLCHAIN" ]; then
            CFLAGS="$CFLAGS -I$TOOLCHAIN/include"
            # C++ stdlib headers (se existir)
            [ -d "$TOOLCHAIN/include/c++/v1" ] && CFLAGS="$CFLAGS -I$TOOLCHAIN/include/c++/v1"
          fi

          echo "[BUILD] CFLAGS: $CFLAGS"

          # ── Compilar ─────────────────────────────────────────
          $CLANG $CFLAGS -c src/main.c -o build/main.o
          echo "[OK] main.o compilado ($(du -h build/main.o | cut -f1))"

          # ── Linkar ───────────────────────────────────────────
          LLD=$(command -v ld.lld-18 || command -v ld.lld)
          echo "[LINK] linker: $LLD"

          LDFLAGS="-m elf_x86_64 -pie --eh-frame-hdr"

          # linker script (se existir)
          if [ -n "$TOOLCHAIN" ] && [ -f "$TOOLCHAIN/link.x" ]; then
            LDFLAGS="$LDFLAGS --script $TOOLCHAIN/link.x"
          fi

          # libs do PS4 — usar os nomes reais conforme ls do toolchain
          if [ -n "$TOOLCHAIN" ]; then
            LDFLAGS="$LDFLAGS -L$TOOLCHAIN/lib"
            [ -f "$TOOLCHAIN/lib/crt1.o" ] && LDFLAGS="$LDFLAGS $TOOLCHAIN/lib/crt1.o"

            echo "[LINK] Bibliotecas em $TOOLCHAIN/lib:"
            ls "$TOOLCHAIN/lib/" 2>/dev/null | head -30

            # ── Libs PS4 específicas (stubs .so ou .a)
            for LIB in SceLibcInternal kernel SceSystemService; do
              if ls "$TOOLCHAIN/lib/"*${LIB}* 2>/dev/null | grep -q .; then
                LDFLAGS="$LDFLAGS -l${LIB}"
                echo "[LINK] + -l${LIB}"
              else
                echo "[LINK] skip -l${LIB}"
              fi
            done

            # ── libc: necessária para __libc_start_main (disponível como libc.a)
            if [ -f "$TOOLCHAIN/lib/libc.a" ]; then
              LDFLAGS="$LDFLAGS -lc"
              echo "[LINK] + -lc (para __libc_start_main)"
            fi

            # ── Builtins do clang (para operações de FP e outros internals)
            BUILTINS=$(ls "$TOOLCHAIN/lib/libclang_rt.builtins"*.a 2>/dev/null | head -1)
            if [ -n "$BUILTINS" ]; then
              LDFLAGS="$LDFLAGS $BUILTINS"
              echo "[LINK] + $BUILTINS"
            fi
          fi

          echo "[LINK] LDFLAGS final: $LDFLAGS"
          $LLD $LDFLAGS build/main.o -o build/UnitVPro.elf


          echo "[OK] UnitVPro.elf ($(du -h build/UnitVPro.elf | cut -f1))"

          # ── Localizar create-eboot (verifica bin/, bin/linux/, extra/) ──────
          CREATE_EBOOT=""
          if [ -n "$TOOLCHAIN" ]; then
            echo "[SELF] Procurando create-eboot em $TOOLCHAIN..."
            # bin/linux/ é onde o OpenOrbis coloca os binários Linux
            for SEARCH_DIR in "$TOOLCHAIN/bin/linux" "$TOOLCHAIN/bin" "$TOOLCHAIN/extra" "$TOOLCHAIN"; do
              if [ -d "$SEARCH_DIR" ]; then
                FOUND=$(find "$SEARCH_DIR" -maxdepth 2 -name "create-eboot" -type f 2>/dev/null | head -1)
                if [ -n "$FOUND" ]; then
                  CREATE_EBOOT="$FOUND"
                  echo "[SELF] Encontrado: $CREATE_EBOOT"
                  break
                fi
              fi
            done

            # Listar bin/linux para diagnóstico
            echo "[SELF] Conteúdo de $TOOLCHAIN/bin/linux/:"
            ls "$TOOLCHAIN/bin/linux/" 2>/dev/null || echo "  (não existe)"
            echo "[SELF] Conteúdo de $TOOLCHAIN/bin/:"
            ls "$TOOLCHAIN/bin/" 2>/dev/null | head -20 || echo "  (não existe)"
          fi

          if [ -n "$CREATE_EBOOT" ]; then
            chmod +x "$CREATE_EBOOT"
            echo "[SELF] Executando: $CREATE_EBOOT"
            "$CREATE_EBOOT" \
              -in="build/UnitVPro.elf" \
              -out="build/eboot.bin" \
              -titleid="UNITV0001" \
              -paid=0x3800000000000011
            echo "[OK] eboot.bin (SELF format) via create-eboot: $(du -h build/eboot.bin | cut -f1)"
            file build/eboot.bin
          else
            echo "[WARN] create-eboot NÃO encontrado!"
            echo "[WARN] Copiando ELF como eboot.bin (PKG pode ser inválido)"
            cp build/UnitVPro.elf build/eboot.bin
          fi

          echo "[BUILD] Arquivos finais:"
          ls -lh build/
          file build/eboot.bin


      # ── 5. Gerar assets (param.sfo + ícones + web files) ─
      - name: 🎨 Gerar param.sfo, ícones e copiar web app
        run: |
          VERSION="${{ github.event.inputs.version || '01.00' }}"
          python3 pkg-tools/make_pkg_assets.py "$VERSION"
          echo "[OK] Assets gerados:"
          ls -lh pkg/sce_sys/ 2>/dev/null || true
          echo "[OK] Web files:"
          find pkg/USRDIR/web -name "*.html" -o -name "*.js" 2>/dev/null | head -10

      # ── 6. Baixar PkgTool.Core ───────────────────────────
      - name: 📦 Baixar PkgTool.Core (LibOrbisPkg Linux)
        run: |
          mkdir -p tools/pkgtool

          # URL CORRETA (confirmada via GitHub API — release v0.2, asset linux-x64)
          # Nome real do asset: PkgTool.Core-linux-x64-0.2.231.zip
          PKGTOOL_URL="https://github.com/maxton/LibOrbisPkg/releases/download/v0.2/PkgTool.Core-linux-x64-0.2.231.zip"

          echo "[PKG] Baixando PkgTool.Core Linux x64..."
          wget -q "$PKGTOOL_URL" -O tools/PkgTool.zip

          # Verificar se é um zip válido
          if file tools/PkgTool.zip | grep -q "Zip archive"; then
            unzip -q tools/PkgTool.zip -d tools/pkgtool/
            echo "[OK] PkgTool.Core extraído:"
            ls -lh tools/pkgtool/
            # Tornar executável
            find tools/pkgtool/ -name "PkgTool*" -not -name "*.dll" -not -name "*.json" \
              -exec chmod +x {} \; 2>/dev/null || true
          else
            echo "[WARN] Download inválido ($(du -h tools/PkgTool.zip | cut -f1))"
            echo "[WARN] Usando builder Python como fallback"
            rm -f tools/PkgTool.zip
          fi

      # ── 7. Gerar pkg.gp4 ────────────────────────────────
      - name: 📋 Gerar pkg.gp4
        run: |
          VERSION="${{ github.event.inputs.version || '01.00' }}"
          python3 pkg-tools/make_gp4.py "$VERSION"

      # ── 8. Build do PKG ──────────────────────────────────────────────
      - name: 🔨 Build fPKG
        run: |
          mkdir -p output
          PKG_BUILT=0

          # ─ Diagnóstico: listar conteúdo de tools/pkgtool
          echo "[PKG] Conteúdo de tools/pkgtool/:"
          ls -lh tools/pkgtool/ 2>/dev/null || echo "  (vazio)"

          # ─ Tentar executável nativo linux-x64 (self-contained, sem dotnet)
          # O binário se chama 'PkgTool.Core' depois da extração
          PKGTOOL_EXE=$(find tools/pkgtool -maxdepth 2 -type f -name "PkgTool.Core" 2>/dev/null | head -1)
          if [ -z "$PKGTOOL_EXE" ]; then
            # Qualquer binário que não seja .dll/.json/.pdb
            PKGTOOL_EXE=$(find tools/pkgtool -maxdepth 2 -type f \
              ! -name "*.dll" ! -name "*.json" ! -name "*.pdb" ! -name "*.xml" \
              2>/dev/null | head -1)
          fi

          if [ -n "$PKGTOOL_EXE" ]; then
            chmod +x "$PKGTOOL_EXE"
            echo "[PKG] Executando: $PKGTOOL_EXE pkg_build pkg/pkg.gp4 output/"
            "$PKGTOOL_EXE" pkg_build pkg/pkg.gp4 output/ && PKG_BUILT=1
            echo "[PKG] Exit code: $?"
          fi

          # ─ Tentar via dotnet se existir .dll
          if [ "$PKG_BUILT" -eq 0 ]; then
            PKGTOOL_DLL=$(find tools/pkgtool -name "PkgTool.Core.dll" 2>/dev/null | head -1)
            if [ -n "$PKGTOOL_DLL" ] && command -v dotnet &>/dev/null; then
              echo "[PKG] Usando PkgTool.Core via dotnet: $PKGTOOL_DLL"
              dotnet "$PKGTOOL_DLL" pkg_build pkg/pkg.gp4 output/ && PKG_BUILT=1
            fi
          fi

          # ─ Resultado
          echo "[PKG] PKG_BUILT=$PKG_BUILT"
          if [ "$PKG_BUILT" -eq 1 ]; then
            echo "[OK] PKG criado por PkgTool.Core:"
            ls -lh output/
            file output/*.pkg 2>/dev/null || true
          else
            echo "[WARN] PkgTool.Core não funcionou!"
            echo "[WARN] O PKG gerado será inválido no PS4."
            echo "[INFO] Verifique o log de download do PkgTool no step anterior."
            # Gera placeholder para que o artifact seja criado
            python3 pkg-tools/build_pkg.py
          fi

          echo "[OUTPUT] Arquivos em output/:"
          ls -lh output/

      # ── 9. Renomear PKG ──────────────────────────────────
      - name: 📝 Renomear PKG final
        run: |
          VERSION="${{ github.event.inputs.version || '01.00' }}"
          REF="${{ github.ref_name }}"
          NAME="UnitVPro_PS4_${REF}_v${VERSION}.pkg"
          find output/ -name "*.pkg" -exec mv {} "output/${NAME}" \; 2>/dev/null || true
          echo "[OK] PKG final:"
          ls -lh output/

      # ── 10. Upload artefato ──────────────────────────────
      - name: 📤 Upload PKG
        uses: actions/upload-artifact@v4
        with:
          name: UnitVPro-PS4-PKG
          path: output/*.pkg
          if-no-files-found: warn
          retention-days: 30

      # ── 11. GitHub Release (somente tags v*) ─────────────
      - name: 🚀 Criar GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: output/*.pkg
          name: "🎮 UnitV Pro PS4 ${{ github.ref_name }}"
          body: |
            ## 🎮 UnitV Pro — App IPTV para PS4

            ### ⬇️ Como instalar
            1. Baixe o arquivo `.pkg` abaixo
            2. Copie para a **raiz** de um pendrive **exFAT**
            3. No PS4 com GoldHEN: `Debug Settings → Package Installer`
            4. Selecione e instale

            | Campo | Valor |
            |-------|-------|
            | Title ID | `UNITV0001` |
            | Versão | `${{ github.ref_name }}` |
            | Build | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            ### 🕹️ Controles
            | Botão | Ação |
            |-------|------|
            | D-Pad | Navegar |
            | X (Cruz) | Confirmar |
            | O (Bola) | Voltar |
            | □ Quadrado | Favoritar |
            | △ Triângulo | Buscar |
            | L1 / R1 | Trocar aba |

            > ⚠️ Requer PS4 com **GoldHEN** e conexão com internet.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
